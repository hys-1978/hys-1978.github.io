<!-- 后台登录 -->
<div id="adminModal" class="modal">
    <div class="modal-content" style="max-width:400px;text-align:center">
        <span class="close" onclick="closeAdminModal()">&times;</span>
        <h3>后台登录</h3><br>
        <input type="password" id="pwd" placeholder="输入管理员密码" style="text-align:center"><br>
        <button class="btn" onclick="checkAdmin()" style="margin-top:20px">登录</button>
        <!-- 新增：退出/关闭按钮 -->
        <button class="btn" onclick="closeAdminModal()" style="margin-top:10px;background:#666">退出/关闭</button>
    </div>
</div>

<!-- 后台内容 -->
<div id="adminPanel" style="display:none" class="container">
    <div class="title">🔐 后台管理中心</div>
    <div style="margin-bottom:30px">
        <h3 style="color:#1a6d3f">商品购买记录</h3>
        <div id="buyList"></div>
    </div>
    <div>
        <h3 style="color:#1a6d3f">寄卖申请记录</h3>
        <div id="sellList"></div>
    </div>
</div>
