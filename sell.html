<!-- 委托寄卖 -->
<div id="sell" class="container">
    <div class="title">📤 委托寄卖</div>
    <div class="form">
        <div class="form-item">
            <label>寄卖人姓名</label>
            <input type="text" id="sname" required>
        </div>
        <div class="form-item">
            <label>班级</label>
            <input type="text" id="sclass" required>
        </div>
        <div class="form-item">
            <label>物品名称</label>
            <input type="text" id="sgoods" required>
        </div>
        <div class="form-item">
            <label>数量</label>
            <input type="number" id="scount" min="1" required>
        </div>
        <div class="form-item">
            <label>物品详情（成色/用途）</label>
            <textarea id="sinfo"></textarea>
        </div>
        <div class="form-item">
            <label>上传实物照片</label>
            <input type="file" id="spic">
        </div>
        <button class="btn" onclick="submitSell()">提交寄卖申请</button>
    </div>
</div>
